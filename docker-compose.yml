services:
  database:
    image: postgres:15-alpine
    container_name: techcup_db
    restart: always
    environment:
      POSTGRES_USER: techcup_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: techcup_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql/init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  postgres_data: