name: Continuous Integration Pipeline

on:
  push:
    branches:
      - develop
      - main

jobs:
  build-test-analyze:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest
    
    # 6. Configurar variables de entorno por ambiente (QA y PROD)
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PROD' || 'QA' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Load Environment Variables from Secrets
        run: |
          echo "ENVIRONMENT=${{ vars.ENVIRONMENT }}" >> $GITHUB_ENV
          echo "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}" >> $GITHUB_ENV
          echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" >> $GITHUB_ENV
          echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> $GITHUB_ENV
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV
          echo "JWT_EXPIRATION=86400000" >> $GITHUB_ENV
          echo "JWT_REFRESH_EXPIRATION=604800000" >> $GITHUB_ENV

      # Validar conexión a Azure PostgreSQL desde el ambiente correspondiente
      - name: Validate Database Connection
        run: |
          echo "Validating connection to ${{ env.ENVIRONMENT }} database..."
          sudo apt-get update -qq && sudo apt-get install -yqq postgresql-client > /dev/null 2>&1
          JDBC_URL="${{ secrets.SPRING_DATASOURCE_URL }}"
          PG_URL="${JDBC_URL#jdbc:}"
          PGPASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" psql \
            "$PG_URL" \
            -U "${{ secrets.SPRING_DATASOURCE_USERNAME }}" \
            -c "SELECT version();" \
            && echo "Database connection successful for ${{ env.ENVIRONMENT }}" \
            || (echo "Database connection FAILED for ${{ env.ENVIRONMENT }}" && exit 1)

      # 3. Instalación de dependencias del proyecto
      - name: Install dependencies
        run: mvn dependency:go-offline -B

      # 4. Configurar paso de ejecución de pruebas unitarias
      - name: Run Unit Tests
        run: mvn test -B

      # 5. Configurar paso de análisis estático con SonarQube
      
      - name: SonarQube Static Analysis
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_ORG_KEY: ${{ secrets.SONAR_ORG_KEY }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: >
          mvn sonar:sonar 
          -Dsonar.organization=${{ env.SONAR_ORG_KEY }} 
          -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} 
          -Dsonar.host.url=${{ env.SONAR_HOST_URL }} 
          -Dsonar.token=${{ env.SONAR_TOKEN }} 
          -B

      # 7. Configurar generación de artefactos y publicación de resultados
      - name: Build Application Package
        run: mvn package -DskipTests -B

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: techcup-backend-${{ env.ENVIRONMENT }}-artifact
          path: target/*.jar
          retention-days: 14

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always() # Garantiza que los resultados de pruebas se suban incluso si fallan
        with:
          name: test-results-${{ env.ENVIRONMENT }}
          path: target/surefire-reports/
          retention-days: 14

  deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-test-analyze
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'PROD' || 'QA' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_REGISTRY_URL }}/techcup-back:latest
            ${{ secrets.AZURE_REGISTRY_URL }}/techcup-back:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        continue-on-error: true
        with:
          auth-type: SERVICE_PRINCIPAL
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          images: ${{ secrets.AZURE_REGISTRY_URL }}/techcup-back:${{ github.sha }}

      - name: Configure App Settings
        uses: azure/appservice-settings@v1
        continue-on-error: true
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "SPRING_DATASOURCE_URL",      "value": "${{ secrets.SPRING_DATASOURCE_URL }}",      "slotSetting": false },
              { "name": "SPRING_DATASOURCE_USERNAME",  "value": "${{ secrets.SPRING_DATASOURCE_USERNAME }}",  "slotSetting": false },
              { "name": "SPRING_DATASOURCE_PASSWORD",  "value": "${{ secrets.SPRING_DATASOURCE_PASSWORD }}",  "slotSetting": false },
              { "name": "JWT_SECRET",                  "value": "${{ secrets.JWT_SECRET }}",                  "slotSetting": false },
              { "name": "JWT_EXPIRATION",              "value": "86400000",                                   "slotSetting": false },
              { "name": "JWT_REFRESH_EXPIRATION",      "value": "604800000",                                  "slotSetting": false },
              { "name": "WEBSITES_PORT",               "value": "8085",                                       "slotSetting": false }
            ]
