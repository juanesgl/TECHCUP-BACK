spring.application.name=techcup-futbol

server.port=8085

logging.level.root=INFO

logging.level.edu.dosw.proyect=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

#Swagger
#spring.mvc.pathmatch.use-suffix-pattern=false
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ??? H2 Database ???????????????????????????????
spring.datasource.url=jdbc:h2:mem:techcupdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Consola H2 (opcional, para ver la BD en el navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console