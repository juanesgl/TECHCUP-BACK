services:
  database:
    image: postgres:15-alpine
    container_name: techcup_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - techcup_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  sonarqube:
    image: sonarqube:community
    container_name: techcup_sonarqube
    restart: unless-stopped
    ports:
      - "${SONAR_PORT:-9000}:9000"
    networks:
      - techcup_net
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: techcup-backend:local
    container_name: techcup_api
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: "8085"
    ports:
      - "${APP_PORT:-8085}:8085"
    networks:
      - techcup_net

networks:
  techcup_net:
    driver: bridge

volumes:
  postgres_data:
    name: techcup_postgres_data
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
